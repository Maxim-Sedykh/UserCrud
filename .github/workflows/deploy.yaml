name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v4
        with:
          context: ./UserCrud
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/usercrud-api:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./usercrud.client
          file: ./usercrud.client/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/usercrud-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /usercrud/UserCrud
            git pull origin master
            kubectl apply -f k8s/ --namespace usercrud
            kubectl rollout restart deployment/api --namespace usercrud
            kubectl rollout restart deployment/frontend --namespace usercrud