server {
    listen 80;
    server_name maximsedykh.ru;
    
    # Редирект всех запросов с HTTP на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Для обновления сертификатов (оставляем для Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name maximsedykh.ru;

    # Пути к сертификатам внутри контейнера
    ssl_certificate /etc/letsencrypt/live/maximsedykh.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maximsedykh.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}