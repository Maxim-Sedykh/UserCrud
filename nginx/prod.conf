server {
    listen 443 ssl http2;
    server_name maximsedykh.ru;

    ssl_certificate /etc/letsencrypt/live/maximsedykh.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maximsedykh.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Секция для существующего API
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # НОВАЯ СЕКЦИЯ ДЛЯ ТВОЕГО БЭКЕНД-ЭНДПОИНТА /cicd
    location /cicd/ { # Важно: слэш в конце, если это префикс!
        proxy_pass http://api:8080; # Направляем на API
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Секция для фронтенда (должна быть ПОСЛЕДНЕЙ, как "catch-all")
    location / {
        try_files $uri $uri/ /index.html;
    }
}